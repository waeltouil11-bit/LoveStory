<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Notre Histoire ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Fond -->
    <div id="stars"></div>

    <div class="gradient"></div>

    <!-- Décor -->
    <div class="moon"></div>

    <div class="floating-hearts"></div>

    <!-- Page 1 -->
    <section id="page1" class="page active">

        <h3>Une petite surprise...</h3>

        <h1 id="typing"></h1>

        <p>
            Ferme les yeux quelques secondes... puis ouvre cette surprise ❤️
        </p>

        <button id="btn1">
            Ouvrir la surprise
        </button>

    </section>

    <!-- Page 2 -->
    <section id="page2" class="page">

        <h1>Notre histoire ❤️</h1>

        <p>
            Chaque belle histoire commence par une rencontre...
        </p>

        <button id="btn2">
            Continuer
        </button>

    </section>

    <!-- Page 3 -->
    <section id="page3" class="page">

        <div id="envelope">

            💌

        </div>

        <p>

            Clique sur l'enveloppe

        </p>

    </section>

    <!-- Page 4 -->
    <section id="page4" class="page">

        <div class="letter">

            <h2>Pour toi ❤️</h2>

            <p id="letterText">

            </p>

            <button id="btn3">

                Voir la suite 🌹

            </button>

        </div>

    </section>

    <!-- Page 5 -->
    <section id="page5" class="page">

        <h1>Une pluie de roses...</h1>

        <div id="roses"></div>

        <button id="btn4">

            Encore ❤️

        </button>

    </section>

    <!-- Page 6 -->
    <section id="page6" class="page">

        <h1 id="finalTitle">

            ❤️

        </h1>

        <p id="finalText">

        </p>

    </section>

    <script src="script.js"></script>

</body>

</html>
